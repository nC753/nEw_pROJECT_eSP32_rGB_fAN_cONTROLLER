; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = main        ; switch this (or use the env picker in VS Code)

[env]
platform = espressif32
framework = arduino
board = esp32dev
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_eol = CRLF
monitor_echo = yes
lib_deps = 
  fastled/FastLED@^3.6.0                ; The lighting engine for your RGB fans
  bblanchon/ArduinoJson@^7.0.4          ; JSON for your MQTT payloads
  knolleary/PubSubClient@^2.8           ; MQTT client communication
  paulstoffregen/OneWire@^2.3.8         ; Protocol for the temperature sensor
  milesburton/DallasTemperature@^3.11.0 ; Translates temperature data

[env:main]
build_src_filter = +<main.cpp>